<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="color-scheme" content="light only">
<meta name="supported-color-schemes" content="light">
<title>The Weekend Report</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400&family=JetBrains+Mono:wght@400;500&family=Source+Sans+3:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    color-scheme: only light;
    --ink: #1a1a1a;
    --paper: #f4ede0;
    --paper-deep: #ebe1cd;
    --paper-edge: #d9cdb3;
    --rust: #8b3a1f;
    --rust-deep: #6b2a14;
    --river: #2c5266;
    --river-deep: #1b3a4b;
    --moss: #4a5d3a;
    --gold: #b8893a;
    --muted: #6b5d4a;
    --line: #b8a888;
  }
  @media (prefers-color-scheme: dark) { :root { color-scheme: only light; } }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-text-size-adjust: 100%; }
  html, body {
    background: #f4ede0 !important;
    color: #1a1a1a !important;
    font-family: 'Source Sans 3', system-ui, sans-serif;
    line-height: 1.5;
    min-height: 100vh;
    color-scheme: only light;
  }
  body {
    background-image:
      radial-gradient(ellipse 1200px 600px at 20% 0%, rgba(184, 137, 58, 0.08), transparent),
      radial-gradient(ellipse 800px 400px at 80% 100%, rgba(44, 82, 102, 0.06), transparent);
    padding: 28px 20px 60px;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    opacity: 0.4;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' stitchTiles='stitch'/%3E%3CfeColorMatrix values='0 0 0 0 0.4 0 0 0 0 0.3 0 0 0 0 0.2 0 0 0 0.08 0'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    z-index: 0;
  }
  .container { max-width: 1200px; margin: 0 auto; position: relative; z-index: 1; }

  .env-warning { background: #fff4e0; border: 1px solid var(--gold); border-left: 4px solid var(--rust); padding: 12px 14px; margin-bottom: 20px; font-family: 'Source Sans 3', sans-serif; font-size: 13px; color: var(--ink); display: none; line-height: 1.4; }
  .env-warning.show { display: block; }
  .env-warning strong { color: var(--rust-deep); }

  .masthead { border-top: 4px double var(--ink); border-bottom: 1px solid var(--ink); padding: 18px 0 12px; margin-bottom: 26px; display: grid; grid-template-columns: 1fr auto 1fr; align-items: end; gap: 20px; }
  .masthead-left, .masthead-right { font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); }
  .masthead-right { text-align: right; }
  .masthead-title { font-family: 'Cormorant Garamond', serif; font-weight: 600; font-size: 48px; line-height: 1; letter-spacing: -0.01em; text-align: center; color: var(--ink); }
  .masthead-title em { font-style: italic; color: var(--rust-deep); font-weight: 500; }
  .masthead-sub { text-align: center; font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 14px; color: var(--muted); margin-top: 4px; }

  .section-h { font-family: 'Cormorant Garamond', serif; font-size: 24px; font-weight: 600; color: var(--ink); border-bottom: 1px solid var(--line); padding-bottom: 5px; margin-bottom: 14px; display: flex; align-items: baseline; justify-content: space-between; gap: 10px; }
  .section-h .sub { font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); font-weight: 400; }


  .days { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 32px; }
  .day { background: var(--paper-deep); border: 1px solid var(--line); padding: 20px 20px 18px; position: relative; }
  .day::before { content: ''; position: absolute; top: -1px; left: -1px; right: -1px; height: 4px; background: var(--rust); }
  .day.recommended::before { background: var(--moss); }
  .day-recommended-tag { position: absolute; top: 8px; right: 10px; font-family: 'JetBrains Mono', monospace; font-size: 9px; letter-spacing: 0.1em; color: var(--moss); text-transform: uppercase; font-weight: 500; }
  .day-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 12px; padding-bottom: 12px; border-bottom: 1px dotted var(--line); }
  .day-name { font-family: 'Cormorant Garamond', serif; font-size: 30px; font-weight: 600; line-height: 1; color: var(--ink); }
  .day-date { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--muted); letter-spacing: 0.04em; }

  .peak-block { background: var(--ink); color: var(--paper); padding: 14px 16px; margin-bottom: 14px; text-align: center; }
  .peak-block .label { font-family: 'JetBrains Mono', monospace; font-size: 9px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--gold); margin-bottom: 3px; }
  .peak-block .time { font-family: 'Cormorant Garamond', serif; font-size: 32px; font-weight: 600; line-height: 1.05; letter-spacing: -0.01em; }
  .peak-block .window { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--paper-edge); letter-spacing: 0.04em; margin-top: 2px; }

  .stats-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 12px; }
  .stat { background: var(--paper); border: 1px solid var(--paper-edge); padding: 8px 10px; }
  .stat .label { font-family: 'JetBrains Mono', monospace; font-size: 9px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); }
  .stat .value { font-family: 'Cormorant Garamond', serif; font-size: 20px; font-weight: 600; color: var(--ink); line-height: 1.1; }
  .stat .unit { font-size: 12px; color: var(--muted); }

  .catch-block { padding: 10px 0; margin-bottom: 12px; border-top: 1px dotted var(--line); border-bottom: 1px dotted var(--line); }
  .catch-block .row { display: flex; justify-content: space-between; align-items: baseline; }
  .catch-block .verdict { font-family: 'Cormorant Garamond', serif; font-size: 22px; font-weight: 600; font-style: italic; line-height: 1; }
  .catch-block .verdict.tier-high { color: var(--moss); }
  .catch-block .verdict.tier-medium { color: var(--gold); }
  .catch-block .verdict.tier-low { color: var(--rust); }
  .catch-block .verdict.tier-pack-it-in { color: var(--muted); }
  .catch-block .verdict.tier-unknown { color: var(--muted); font-size: 18px; }
  .catch-block .pct { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--muted); letter-spacing: 0.04em; }
  .catch-block .quip { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 12px; color: var(--ink); margin-top: 4px; line-height: 1.35; }
  .catch-block .flow-tag { font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 0.06em; text-transform: uppercase; color: var(--river-deep); margin-top: 6px; padding-top: 6px; border-top: 1px dotted var(--paper-edge); }

  /* Location cards with drive button */
  .loc-card { background: var(--paper); border: 1px solid var(--paper-edge); padding: 12px 14px; margin-bottom: 12px; }
  .loc-card.food { border-style: dashed; }
  .loc-card-head { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; }
  .loc-card-label { font-family: 'JetBrains Mono', monospace; font-size: 9px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); margin-bottom: 2px; }
  .loc-card-name { font-family: 'Cormorant Garamond', serif; font-size: 18px; font-weight: 600; color: var(--rust-deep); line-height: 1.15; }
  .loc-card-meta { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--muted); margin-top: 2px; letter-spacing: 0.02em; }
  .loc-card-rationale { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 12px; color: var(--ink); margin-top: 8px; line-height: 1.4; padding-top: 8px; border-top: 1px dotted var(--paper-edge); }
  .loc-card-order { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 13px; color: var(--ink); margin-top: 6px; }
  .loc-card-blurb { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 11px; color: var(--muted); margin-top: 4px; line-height: 1.4; }

  /* Drive button */
  .drive-btn {
    flex-shrink: 0;
    background: var(--river-deep);
    color: var(--paper);
    text-decoration: none;
    padding: 8px 12px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    border: 1px solid var(--river-deep);
    transition: all 0.15s ease;
    white-space: nowrap;
    align-self: flex-start;
  }
  .drive-btn:hover, .drive-btn:active {
    background: var(--river);
    transform: translate(-1px, -1px);
    box-shadow: 2px 2px 0 var(--gold);
  }

  /* River picker */
  .river-picker { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 32px; }
  .river-btn {
    flex: 1 1 auto;
    min-width: 90px;
    background: var(--paper-deep);
    color: var(--ink);
    border: 1px solid var(--line);
    padding: 12px 14px;
    font-family: 'Cormorant Garamond', serif;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s ease;
    text-align: center;
  }
  .river-btn:hover { background: var(--paper); border-color: var(--rust); }
  .river-btn.active {
    background: var(--ink);
    color: var(--paper);
    border-color: var(--ink);
    box-shadow: 2px 2px 0 var(--gold);
  }

  .fly-block { font-family: 'Cormorant Garamond', serif; font-size: 12px; color: var(--ink); margin-bottom: 12px; line-height: 1.5; padding-top: 10px; border-top: 1px dotted var(--line); }
  .fly-block .label { font-family: 'JetBrains Mono', monospace; font-size: 9px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); margin-bottom: 3px; display: block; }
  .fly-block .flies { font-style: italic; }
  .fly-block .setup { font-size: 11px; color: var(--muted); font-style: italic; }

  .cal-btn {
    display: block; width: 100%;
    background: var(--river-deep); color: var(--paper);
    border: none; padding: 11px 14px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase;
    cursor: pointer; transition: all 0.15s ease;
    text-align: center;
  }
  .cal-btn:hover, .cal-btn:active { background: var(--river); transform: translate(-1px, -1px); box-shadow: 2px 2px 0 var(--gold); }
  .cal-btn::before { content: '✚ '; color: var(--gold); }

  .flows-panel { background: var(--paper-deep); border: 1px solid var(--line); padding: 18px 22px; margin-bottom: 26px; }
  .flows-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .flow { border-left: 3px solid var(--river); padding-left: 12px; }
  .flow .river { font-family: 'Cormorant Garamond', serif; font-size: 16px; font-weight: 600; color: var(--ink); }
  .flow .gauge { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--muted); margin-bottom: 4px; }
  .flow .reading { font-family: 'Cormorant Garamond', serif; font-size: 20px; color: var(--river-deep); }
  .flow .reading .unit { font-size: 11px; color: var(--muted); margin-left: 3px; }
  .flow .when { font-family: 'JetBrains Mono', monospace; font-size: 9px; color: var(--muted); margin-top: 2px; }
  .flow .verdict { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 11px; color: var(--muted); margin-top: 3px; }
  .flow .gauge-link { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--river-deep); text-decoration: underline; margin-top: 4px; display: inline-block; }

  .resources { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 24px; }
  .resource { background: var(--paper-deep); border: 1px solid var(--line); padding: 14px 16px; text-decoration: none; color: var(--ink); transition: all 0.2s ease; display: block; }
  .resource:hover { background: var(--ink); color: var(--paper); transform: translate(-1px, -1px); box-shadow: 2px 2px 0 var(--rust); }
  .resource .label { font-family: 'JetBrains Mono', monospace; font-size: 9px; letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 3px; color: var(--rust-deep); }
  .resource:hover .label { color: var(--gold); }
  .resource .name { font-family: 'Cormorant Garamond', serif; font-size: 16px; font-weight: 600; }
  .resource .desc { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 12px; color: var(--muted); }
  .resource:hover .desc { color: var(--paper-edge); }

  .colophon { border-top: 1px solid var(--ink); padding-top: 12px; margin-top: 24px; display: flex; justify-content: space-between; font-family: 'JetBrains Mono', monospace; font-size: 9px; color: var(--muted); letter-spacing: 0.04em; text-transform: uppercase; flex-wrap: wrap; gap: 6px; }

  .loading { color: var(--muted); font-style: italic; font-family: 'Cormorant Garamond', serif; font-size: 13px; }


  .flow .flow-note { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 10px; color: var(--muted); margin-top: 4px; line-height: 1.35; padding-top: 4px; border-top: 1px dotted var(--paper-edge); }



  /* Closed-river button state */
  .river-btn.closed { opacity: 0.5; position: relative; }
  .river-btn.closed:not(.active) { background: var(--paper); color: var(--muted); border-style: dashed; }
  .river-btn .closed-tag { display: block; font-family: 'JetBrains Mono', monospace; font-size: 8px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--rust); margin-top: 2px; font-weight: 500; }
  .river-btn.active.closed { background: var(--rust-deep); color: var(--paper); border-color: var(--rust-deep); }
  .river-btn.active.closed .closed-tag { color: var(--gold); }

  /* Today card — wider, two-column on desktop */
  .today-wrap { margin-bottom: 32px; }
  .today-card { background: var(--paper-deep); border: 1px solid var(--line); padding: 24px; position: relative; }
  .today-card::before { content: ''; position: absolute; top: -1px; left: -1px; right: -1px; height: 4px; background: var(--moss); }
  .today-card .day-recommended-tag { position: absolute; top: 10px; right: 14px; font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; font-weight: 500; }
  .today-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 14px; }
  .today-col-left, .today-col-right { display: flex; flex-direction: column; }
  @media (max-width: 700px) {
    .today-grid { grid-template-columns: 1fr; gap: 12px; }
    .today-card { padding: 18px; }
  }


  /* Action row — Calendar + Log Outcome side by side */
  .action-row { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
  .log-btn {
    display: block; width: 100%;
    background: var(--paper); color: var(--ink);
    border: 1px solid var(--ink); padding: 11px 10px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase;
    cursor: pointer; transition: all 0.15s ease;
    text-align: center; box-sizing: border-box;
  }
  .log-btn:hover, .log-btn:active { background: var(--ink); color: var(--paper); transform: translate(-1px, -1px); box-shadow: 2px 2px 0 var(--gold); }
  .log-btn::before { content: '✎ '; color: var(--rust); }
  .log-btn:hover::before, .log-btn:active::before { color: var(--gold); }

  /* Outcome modal */
  .outcome-modal {
    position: fixed; inset: 0;
    background: rgba(26, 26, 26, 0.7);
    z-index: 9998;
    display: flex; align-items: center; justify-content: center;
    padding: 20px;
    backdrop-filter: blur(4px);
  }
  .outcome-card {
    background: var(--paper);
    border: 1px solid var(--ink);
    box-shadow: 4px 4px 0 var(--gold);
    padding: 28px;
    max-width: 480px;
    width: 100%;
    max-height: 90vh;
    overflow-y: auto;
  }
  .outcome-card-wide { max-width: 640px; }
  .outcome-card h3 { font-family: 'Cormorant Garamond', serif; font-size: 28px; font-weight: 600; color: var(--ink); margin-bottom: 4px; }
  .outcome-date { font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); margin-bottom: 4px; }
  .outcome-predicted { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 14px; color: var(--rust-deep); margin-bottom: 18px; }
  .outcome-buttons { display: grid; grid-template-columns: 1fr; gap: 8px; margin-bottom: 16px; }
  .outcome-btn {
    background: var(--paper-deep); color: var(--ink);
    border: 2px solid var(--line);
    padding: 12px 14px;
    font-family: 'Cormorant Garamond', serif; font-size: 15px; font-weight: 500;
    cursor: pointer; text-align: left;
    transition: all 0.15s ease;
  }
  .outcome-btn:hover { background: var(--paper); }
  .outcome-btn.picked { background: var(--ink); color: var(--paper); }
  .outcome-notes {
    width: 100%; padding: 10px 12px;
    border: 1px solid var(--line); background: var(--paper);
    font-family: 'Cormorant Garamond', serif; font-size: 14px;
    min-height: 60px; resize: vertical;
    margin-bottom: 14px;
    outline: none;
    box-sizing: border-box;
  }
  .outcome-notes:focus { border-color: var(--rust); }
  .outcome-actions { display: flex; gap: 8px; justify-content: flex-end; }
  .outcome-cancel, .outcome-submit, .outcome-export {
    padding: 10px 18px;
    font-family: 'JetBrains Mono', monospace; font-size: 10px;
    letter-spacing: 0.12em; text-transform: uppercase;
    cursor: pointer; border: none;
    transition: all 0.15s ease;
  }
  .outcome-cancel { background: var(--paper-deep); color: var(--ink); border: 1px solid var(--line); }
  .outcome-cancel:hover { background: var(--paper); }
  .outcome-submit { background: var(--ink); color: var(--paper); }
  .outcome-submit:hover { background: var(--rust-deep); box-shadow: 2px 2px 0 var(--gold); transform: translate(-1px, -1px); }
  .outcome-export { background: var(--river-deep); color: var(--paper); }
  .outcome-export:hover { background: var(--river); box-shadow: 2px 2px 0 var(--gold); transform: translate(-1px, -1px); }
  .outcome-empty { font-family: 'Cormorant Garamond', serif; font-style: italic; color: var(--muted); padding: 20px 0; text-align: center; }

  /* Feedback summary */
  .feedback-summary { display: flex; flex-wrap: wrap; gap: 6px; margin: 12px 0 18px; }
  .fs-tag { font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 0.06em; text-transform: uppercase; padding: 4px 10px; border-radius: 0; border: 1px solid; }
  .fs-blank { color: #8b3a1f; border-color: #8b3a1f; }
  .fs-tough { color: #a66b3a; border-color: #a66b3a; }
  .fs-workable { color: #b8893a; border-color: #b8893a; }
  .fs-good { color: #4a5d3a; border-color: #4a5d3a; }
  .fs-great { color: #2d4a1f; border-color: #2d4a1f; background: #f4ede0; }
  .feedback-list { max-height: 400px; overflow-y: auto; border-top: 1px solid var(--line); }
  .feedback-row {
    display: grid; grid-template-columns: 70px 1fr 90px 40px;
    gap: 10px; padding: 8px 4px;
    border-bottom: 1px dotted var(--paper-edge);
    font-size: 13px;
    align-items: baseline;
  }
  .fr-date { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--muted); }
  .fr-activity { font-family: 'Cormorant Garamond', serif; }
  .fr-outcome { font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 0.06em; text-transform: uppercase; }
  .fr-blank { color: #8b3a1f; }
  .fr-tough { color: #a66b3a; }
  .fr-workable { color: #b8893a; }
  .fr-good { color: #4a5d3a; }
  .fr-great { color: #2d4a1f; font-weight: 600; }
  .fr-predicted { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--river-deep); text-align: right; }
  .fr-notes { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 12px; color: var(--muted); padding: 0 4px 8px 80px; border-bottom: 1px dotted var(--paper-edge); }

  /* Toast notification */
  .wr-toast {
    position: fixed; bottom: 30px; left: 50%; transform: translate(-50%, 20px);
    background: var(--ink); color: var(--paper);
    padding: 12px 24px;
    font-family: 'JetBrains Mono', monospace; font-size: 11px;
    letter-spacing: 0.08em; text-transform: uppercase;
    border: 1px solid var(--gold);
    z-index: 9999;
    opacity: 0;
    transition: all 0.3s ease;
  }
  .wr-toast.show { opacity: 1; transform: translate(-50%, 0); }

  @media (max-width: 700px) {
    .feedback-row { grid-template-columns: 60px 1fr 70px 35px; font-size: 12px; gap: 6px; }
    .outcome-card { padding: 20px; }
    .outcome-card h3 { font-size: 22px; }
  }


  .outcome-actions-multi { flex-wrap: wrap; gap: 6px; }
  .outcome-import {
    padding: 10px 18px;
    font-family: 'JetBrains Mono', monospace; font-size: 10px;
    letter-spacing: 0.12em; text-transform: uppercase;
    cursor: pointer; border: 1px solid var(--river-deep);
    background: var(--paper); color: var(--river-deep);
    transition: all 0.15s ease;
  }
  .outcome-import:hover { background: var(--river-deep); color: var(--paper); }
  .outcome-clear {
    padding: 10px 18px;
    font-family: 'JetBrains Mono', monospace; font-size: 10px;

<script>
(function() {
  'use strict';
  if (window.__wrGateRan) return;
  window.__wrGateRan = true;
  const STORAGE_KEY = 'wr_session_v17';
  const payload = JSON.parse(document.getElementById('payload').textContent);
  const gate = document.getElementById('gate');
  const mount = document.getElementById('decrypted-mount');
  const input = document.getElementById('gate-input');
  const btn = document.getElementById('gate-btn');
  const errEl = document.getElementById('gate-error');
  let attempts = 0;
  let unlocked = false;
  function b64toBytes(s) { const bin = atob(s); const bytes = new Uint8Array(bin.length); for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i); return bytes; }
  async function deriveKey(password, salt, iterations) {
    const enc = new TextEncoder();
    const baseKey = await crypto.subtle.importKey('raw', enc.encode(password), { name: 'PBKDF2' }, false, ['deriveKey']);
    return await crypto.subtle.deriveKey({ name: 'PBKDF2', salt: salt, iterations: iterations, hash: 'SHA-256' }, baseKey, { name: 'AES-GCM', length: 256 }, false, ['decrypt']);
  }
  async function decrypt(password) {
    const salt = b64toBytes(payload.salt); const iv = b64toBytes(payload.iv); const ct = b64toBytes(payload.ct);
    const key = await deriveKey(password, salt, payload.iter);
    const ptBuf = await crypto.subtle.decrypt({ name: 'AES-GCM', iv: iv }, key, ct);
    return new TextDecoder().decode(ptBuf);
  }
  function executeScriptsIn(container) {
    const scripts = container.querySelectorAll('script');
    scripts.forEach(oldScript => {
      const newScript = document.createElement('script');
      Array.from(oldScript.attributes).forEach(attr => newScript.setAttribute(attr.name, attr.value));
      newScript.text = oldScript.text;
      oldScript.parentNode.replaceChild(newScript, oldScript);
    });
  }
  async function tryUnlock(password) {
    if (unlocked) return true;
    btn.disabled = true; btn.textContent = 'Unlocking…';
    try {
      const html = await decrypt(password);
      unlocked = true;
      try { sessionStorage.setItem(STORAGE_KEY, password); } catch(e) {}
      gate.style.transition = 'opacity 0.3s ease'; gate.style.opacity = '0';
      setTimeout(() => {
        mount.innerHTML = html;
        executeScriptsIn(mount);
        gate.remove();
      }, 300);
      return true;
    } catch (e) {
      btn.disabled = false; btn.textContent = 'Enter';
      attempts++;
      input.classList.add('error');
      const msgs = ['Not quite. Try again.','The river keeps its secrets.','Match the hatch.', attempts > 4 ? 'Ask the angler whose dashboard this is.' : 'Wrong fly.'];
      errEl.textContent = msgs[Math.min(attempts - 1, msgs.length - 1)];
      input.value = '';
      setTimeout(() => input.classList.remove('error'), 400);
      input.focus();
      return false;
    }
  }
  try { const saved = sessionStorage.getItem(STORAGE_KEY); if (saved) { tryUnlock(saved); return; } } catch(e) {}
  setTimeout(() => input && input.focus(), 100);
  btn.addEventListener('click', () => { const val = (input.value || '').trim().toLowerCase(); if (val) tryUnlock(val); });
  input.addEventListener('keydown', (e) => { if (e.key === 'Enter') { const val = (input.value || '').trim().toLowerCase(); if (val) tryUnlock(val); } });
})();
</script>
